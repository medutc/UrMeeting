<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UrMeeting</title>
  <!-- Link to the external CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>UrMeeting Platform</h1>

  <!-- LOGIN SECTION -->
  <div id="login-section" class="card">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="login-error" style="color: red;"></p>
  </div>

  <!-- DASHBOARD SECTION -->
  <div id="dashboard-section" class="hidden">
    <h2 id="welcome-message"></h2>
    <button onclick="logout()">Logout</button>

    <!-- ADMIN ONLY: CREATE USER -->
    <div id="admin-panel" class="hidden card">
      <h3>Create Employee (Your Department)</h3>
      <input type="text" id="new-emp-username" placeholder="New Employee Username">
      <input type="password" id="new-emp-password" placeholder="Password">
      <button onclick="createEmployee()">Create Employee</button>
    </div>

    <!-- MEETINGS LIST -->
    <div class="card">
      <h3>Meetings</h3>
      <button onclick="fetchMeetings()">Refresh Meetings</button>
      <ul id="meetings-list"></ul>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000';

    // 1. Handle Login
    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const res = await fetch(`${API_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('department', data.department);
        showDashboard(username, data.role, data.department);
      } else {
        document.getElementById('login-error').innerText = "Invalid Credentials";
      }
    }

    // 2. Toggle UI
    function showDashboard(username, role, department) {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('dashboard-section').classList.remove('hidden');
      document.getElementById('welcome-message').innerText = `Welcome ${username} (${role} - ${department})`;

      if (role === 'Admin') {
        document.getElementById('admin-panel').classList.remove('hidden');
      }
      fetchMeetings();
    }

    // 3. Fetch Meetings
    async function fetchMeetings() {
      const token = localStorage.getItem('token');
      const res = await fetch(`${API_URL}/meetings`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      const meetings = await res.json();
      const list = document.getElementById('meetings-list');
      list.innerHTML = ''; // Clear current list
      
      meetings.forEach(m => {
        const li = document.createElement('li');
        li.innerText = `${m.title} - ${new Date(m.date).toLocaleString()}`;
        list.appendChild(li);
      });
    }

    // 4. Create Employee (Admin Only)
    async function createEmployee() {
      const username = document.getElementById('new-emp-username').value;
      const password = document.getElementById('new-emp-password').value;
      const token = localStorage.getItem('token');

      const res = await fetch(`${API_URL}/users`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}` 
        },
        body: JSON.stringify({ username, password })
      });

      if (res.ok) {
        alert("Employee created successfully!");
      } else {
        alert("Failed to create employee.");
      }
    }

    // 5. Logout
    function logout() {
      localStorage.clear();
      document.getElementById('login-section').classList.remove('hidden');
      document.getElementById('dashboard-section').classList.add('hidden');
      document.getElementById('admin-panel').classList.add('hidden');
    }

    // Auto-login if token exists
    if(localStorage.getItem('token')) {
      showDashboard('User', localStorage.getItem('role'), localStorage.getItem('department'));
    }
  </script>
</body>
</html>
