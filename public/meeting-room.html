<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meeting Room</title>
<link rel="stylesheet" href="meeting-room.css">
</head>
<body>
  <div class="room-wrap" id="roomWrap">
    <div class="room-header">
      <div>
        <h1 id="meetingTitle">Loading meeting...</h1>
        <div class="sub" id="meetingSub"></div>
      </div>
      <div class="sub" id="participantCount"></div>
    </div>

    <div class="room-body">
      <div class="video-area" id="videoArea">
        <div class="center-msg" id="centerMsg">Connecting...</div>
      </div>
      <div class="chat-panel" id="chatPanel">
        <div class="chat-header">💬 Meeting Chat</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Type a message..." maxlength="2000">
          <button onclick="sendChat()">Send</button>
        </div>
      </div>
    </div>

   <div class="controls-bar">
  <button class="ctrl-btn" id="micBtn" title="Toggle microphone">
    <img src="images/mic.png" alt="Mic" class="btn-icon">
  </button>
  <button class="ctrl-btn" id="camBtn" title="Toggle camera">
    <img src="images/camera.png" alt="Camera" class="btn-icon">
  </button>
  <button class="ctrl-btn chat-toggle active" id="chatBtn" title="Toggle chat">
    <img src="images/chat.png" alt="Chat" class="btn-icon">
  </button>
  <button class="ctrl-btn leave" id="leaveBtn">Leave Meeting</button>
</div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script src="common.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const meetingId = params.get('id');
if (!meetingId) window.location.href = '/index.html';

let currentUser = null;
let localStream = null;
let socket = null;
const peers = {}; // socketId -> { pc: RTCPeerConnection, videoEl }
const STUN_CONFIG = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;

  let meeting;
  try {
    const data = await apiGet('/api/meetings/' + meetingId);
    meeting = data.meeting;
  } catch (err) {
    document.getElementById('centerMsg').textContent = 'You are not authorized to join this meeting: ' + err.message;
    return;
  }

  document.getElementById('meetingTitle').textContent = meeting.title;
  document.getElementById('meetingSub').textContent =
    `${meeting.departmentName} • ${meeting.date} at ${meeting.time} • Organized by ${meeting.createdByName}`;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (err) {
    document.getElementById('centerMsg').textContent =
      'Camera/microphone access denied or unavailable. You can still use chat.';
    localStream = new MediaStream(); // empty stream, so peer connections still work for chat-only
  }

  renderLocalTile();
  connectSocket();

  document.getElementById('micBtn').addEventListener('click', toggleMic);
  document.getElementById('camBtn').addEventListener('click', toggleCam);
  document.getElementById('chatBtn').addEventListener('click', toggleChatPanel);
  document.getElementById('leaveBtn').addEventListener('click', leaveMeeting);
  document.getElementById('chatInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendChat();
  });
}

function renderLocalTile() {
  const centerMsg = document.getElementById('centerMsg');
  if (centerMsg) centerMsg.remove();

  const videoArea = document.getElementById('videoArea');
  const tile = document.createElement('div');
  tile.className = 'video-tile';
  tile.id = 'tile-local';
  const video = document.createElement('video');
  video.autoplay = true; video.muted = true; video.playsInline = true;
  video.srcObject = localStream;
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = currentUser.name + ' (You)';
  tile.appendChild(video);
  tile.appendChild(label);
  videoArea.appendChild(tile);
}

function connectSocket() {
  socket = io();

  socket.on('connect', () => {
    socket.emit('join-room', { meetingId, userId: currentUser.id });
  });

  socket.on('join-error', (msg) => {
    document.getElementById('centerMsg').textContent = 'Cannot join: ' + msg;
  });

  // Existing participants already in the room -> we call each of them
  socket.on('existing-users', (users) => {
    users.forEach(u => createPeerConnection(u.socketId, u.name, true));
    updateParticipantCount();
  });

  // Someone new joined after us -> they will call us; just prep the tile
  socket.on('user-joined', (u) => {
    addSystemChatLine(`${u.name} joined the meeting`);
    updateParticipantCount();
  });

  socket.on('signal', async ({ from, name, data }) => {
    let entry = peers[from];
    if (!entry) entry = createPeerConnection(from, name, false);

    if (data.type === 'offer') {
      await entry.pc.setRemoteDescription(new RTCSessionDescription(data));
      const answer = await entry.pc.createAnswer();
      await entry.pc.setLocalDescription(answer);
      socket.emit('signal', { to: from, data: entry.pc.localDescription });
    } else if (data.type === 'answer') {
      await entry.pc.setRemoteDescription(new RTCSessionDescription(data));
    } else if (data.candidate) {
      try { await entry.pc.addIceCandidate(data); } catch (e) { /* ignore */ }
    }
  });

  socket.on('user-left', (u) => {
    addSystemChatLine(`${u.name} left the meeting`);
    const tile = document.getElementById('tile-' + u.socketId);
    if (tile) tile.remove();
    if (peers[u.socketId]) {
      peers[u.socketId].pc.close();
      delete peers[u.socketId];
    }
    updateParticipantCount();
  });

  socket.on('chat-message', (msg) => {
    addChatLine(msg.name, msg.text, msg.time, msg.from === currentUser.id);
  });
}

function createPeerConnection(socketId, name, isInitiator) {
  const pc = new RTCPeerConnection(STUN_CONFIG);
  peers[socketId] = { pc, name };

  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.onicecandidate = (e) => {
    if (e.candidate) socket.emit('signal', { to: socketId, data: e.candidate });
  };

  pc.ontrack = (e) => {
    let tile = document.getElementById('tile-' + socketId);
    if (!tile) {
      const videoArea = document.getElementById('videoArea');
      tile = document.createElement('div');
      tile.className = 'video-tile';
      tile.id = 'tile-' + socketId;
      const video = document.createElement('video');
      video.autoplay = true; video.playsInline = true;
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = name || 'Participant';
      tile.appendChild(video);
      tile.appendChild(label);
      videoArea.appendChild(tile);
    }
    const videoEl = tile.querySelector('video');
    if (videoEl.srcObject !== e.streams[0]) videoEl.srcObject = e.streams[0];
  };

  if (isInitiator) {
    pc.onnegotiationneeded = async () => {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit('signal', { to: socketId, data: pc.localDescription });
    };
  }

  return peers[socketId];
}

function updateParticipantCount() {
  const count = Object.keys(peers).length + 1;
  document.getElementById('participantCount').textContent = `👥 ${count} in the meeting`;
}

function toggleMic() {
  const track = localStream.getAudioTracks()[0];
  if (!track) return;
  track.enabled = !track.enabled;
  document.getElementById('micBtn').classList.toggle('off', !track.enabled);
  // Removed the line that overwrites the image with text emojis
}

function toggleCam() {
  const track = localStream.getVideoTracks()[0];
  if (!track) return;
  track.enabled = !track.enabled;
  document.getElementById('camBtn').classList.toggle('off', !track.enabled);
  // Removed the line that overwrites the image with text emojis
}

function toggleChatPanel() {
  const panel = document.getElementById('chatPanel');
  panel.classList.toggle('hidden');
  document.getElementById('chatBtn').classList.toggle('active', !panel.classList.contains('hidden'));
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  socket.emit('chat-message', { meetingId, text });
  input.value = '';
}

function addChatLine(name, text, time, isMe) {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg';
  const t = new Date(time);
  const timeStr = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `<span class="who">${escapeHtml(isMe ? 'You' : name)}</span><span class="when">${timeStr}</span>
    <div class="text">${escapeHtml(text)}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function addSystemChatLine(text) {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = `<div class="text" style="color:#9ca3af; font-style:italic;">${escapeHtml(text)}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function leaveMeeting() {
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  Object.values(peers).forEach(p => p.pc.close());
  if (socket) socket.disconnect();
  redirectByRole(currentUser.role);
}

window.addEventListener('beforeunload', () => {
  if (localStream) localStream.getTracks().forEach(t => t.stop());
});

init();
</script>
</body>
</html>
