        <button class="ctrl-btn" id="lobbyCamBtn" title="Toggle camera">

    <div class="lobby-panel">

    </div>

      </div>
      <div class="chat-panel" id="chatPanel">

        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">

          <button onclick="sendChat()">Send</button>

    <div class="captions-display" id="captionsDisplay" style="display:none;">

    </div>

        <img src="images/mic.png" alt="Mic" class="btn-icon">
      </button>
      <button class="ctrl-btn" id="camBtn" title="Toggle camera">
        <img src="images/camera.png" alt="Camera" class="btn-icon">
      </button>
      <button class="ctrl-btn" id="screenShareBtn" title="Share your screen">🖥️</button>
      <button class="ctrl-btn" id="handBtn" title="Raise/lower hand">✋</button>

      <button class="ctrl-btn" id="reactionBtn" title="Send a reaction">😀</button>
      <div class="popover reactions-popover" id="reactionsPopover"></div>

      <button class="ctrl-btn" id="bgBtn" title="Change background">🖼️</button>
      <div class="popover bg-popover" id="bgPopover"></div>

      <button class="ctrl-btn captions-toggle" id="toggleCaptionsBtn" type="button" title="Turn live captions on" aria-label="Turn live captions on" aria-pressed="false">CC</button>

      <button class="ctrl-btn admin-settings-btn" id="adminSettingsBtn" title="Open meeting controls" aria-label="Open meeting controls" aria-expanded="false" style="display:none;">⚙</button>

      <button class="ctrl-btn chat-toggle active" id="chatBtn" title="Toggle chat">
        <img src="images/chat.png" alt="Chat" class="btn-icon">
      </button>
      <button class="ctrl-btn leave" id="leaveBtn">Leave Meeting</button>

  <div class="admin-panel-backdrop" id="adminPanelBackdrop" hidden>

        <button class="close-btn" id="closeAdminPanelBtn" type="button" title="Close meeting controls" aria-label="Close meeting controls">✕</button>

          <button class="admin-btn" id="cameraOffAllBtn" type="button">Turn cameras off</button>
          <button class="admin-btn danger" id="stopAllScreenBtn" type="button">Stop all sharing</button>

const peers = {};
const remoteState = {};
function getRemoteState(socketId) {
  if (!remoteState[socketId]) {
    remoteState[socketId] = {
      name: null,
      handRaised: false,
      sharingScreen: false,
      micMuted: false,
      cameraOn: true
    };
  }
  return remoteState[socketId];
}
let iceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

async function loadIceConfig() {
  try {
    const data = await apiGet('/api/ice-config');
    if (data.iceServers && data.iceServers.length) {
      iceConfig = { iceServers: data.iceServers, iceCandidatePoolSize: 10 };
    }
  } catch (err) {
    console.warn('Could not load ICE config, using STUN-only fallback', err);
  }
}

async function flushPendingIceCandidates(entry) {
  if (!entry.pendingCandidates || !entry.pendingCandidates.length) return;
  const pending = entry.pendingCandidates.splice(0);
  for (const candidate of pending) {
    try {
      await entry.pc.addIceCandidate(new RTCIceCandidate(candidate));
    } catch (e) {
      console.warn('Failed to add queued ICE candidate', e);
    }
  }
}

async function addIceCandidateToPeer(entry, candidateData) {
  if (!entry.pendingCandidates) entry.pendingCandidates = [];
  if (!entry.pc.remoteDescription) {
    entry.pendingCandidates.push(candidateData);
    return;
  }
  try {
    await entry.pc.addIceCandidate(new RTCIceCandidate(candidateData));
  } catch (e) {
    console.warn('Failed to add ICE candidate', e);
  }
}

async function renegotiatePeer(socketId, iceRestart = false) {
  const entry = peers[socketId];
  if (!entry?.pc || entry.pc.signalingState === 'closed') return;
  try {
    const offer = await entry.pc.createOffer(iceRestart ? { iceRestart: true } : undefined);
    await entry.pc.setLocalDescription(offer);
    socket.emit('signal', { to: socketId, data: entry.pc.localDescription });
  } catch (e) {
    console.warn('Renegotiation failed for peer', socketId, e);
  }
}

// Called when ICE connectivity between two peers breaks down (typically because
// no usable TURN relay was available). Triggers a fresh ICE gathering + offer.
let iceRestartAttempts = {};
function restartIce(socketId) {
  iceRestartAttempts[socketId] = (iceRestartAttempts[socketId] || 0) + 1;
  if (iceRestartAttempts[socketId] > 3) {
    console.warn('Giving up on ICE restarts for', socketId, '- TURN server is likely unreachable or misconfigured.');
    return;
  }
  renegotiatePeer(socketId, true);
}

// ============================================================
// SOUND NOTIFICATION FUNCTIONS
// ============================================================
function playNotificationSound(type) {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    switch(type) {
      case 'hand-raise':
        playHandRaiseSound(audioContext);
        break;
      case 'screen-share':
        playScreenShareSound(audioContext);
        break;
      case 'user-join':
        playUserJoinSound(audioContext);
        break;
      case 'user-left':
        playUserLeftSound(audioContext);
        break;
    }
  } catch (err) {
    console.log('Audio notification error:', err);
  }
}

function playHandRaiseSound(audioContext) {
  const now = audioContext.currentTime;
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  
  osc.connect(gain);
  gain.connect(audioContext.destination);
  
  osc.frequency.setValueAtTime(784, now);
  osc.frequency.exponentialRampToValueAtTime(1046, now + 0.15);
  
  gain.gain.setValueAtTime(0.3, now);
  gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
  
  osc.start(now);
  osc.stop(now + 0.2);
}

function playScreenShareSound(audioContext) {
  const now = audioContext.currentTime;
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  
  osc.connect(gain);
  gain.connect(audioContext.destination);
  
  osc.frequency.setValueAtTime(880, now);
  osc.frequency.setValueAtTime(880, now + 0.1);
  osc.frequency.setValueAtTime(1108, now + 0.2);
  
  gain.gain.setValueAtTime(0.25, now);
  gain.gain.setValueAtTime(0.25, now + 0.1);
  gain.gain.setValueAtTime(0, now + 0.15);
  gain.gain.setValueAtTime(0.25, now + 0.2);
  gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
  
  osc.start(now);
  osc.stop(now + 0.35);
}

function playUserJoinSound(audioContext) {
  const now = audioContext.currentTime;
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  
  osc.connect(gain);
  gain.connect(audioContext.destination);
  
  osc.frequency.setValueAtTime(523, now);
  osc.frequency.setValueAtTime(523, now + 0.08);
  osc.frequency.setValueAtTime(659, now + 0.16);
  osc.frequency.setValueAtTime(659, now + 0.24);
  osc.frequency.setValueAtTime(784, now + 0.32);
  
  gain.gain.setValueAtTime(0.2, now);
  gain.gain.setValueAtTime(0.2, now + 0.08);
  gain.gain.setValueAtTime(0, now + 0.12);
  gain.gain.setValueAtTime(0.2, now + 0.16);
  gain.gain.setValueAtTime(0, now + 0.24);
  gain.gain.setValueAtTime(0.2, now + 0.32);
  gain.gain.exponentialRampToValueAtTime(0.01, now + 0.42);
  
  osc.start(now);
  osc.stop(now + 0.42);
}

function playUserLeftSound(audioContext) {
  const now = audioContext.currentTime;
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  
  osc.connect(gain);
  gain.connect(audioContext.destination);
  
  osc.frequency.setValueAtTime(784, now);
  osc.frequency.setValueAtTime(784, now + 0.08);
  osc.frequency.setValueAtTime(659, now + 0.16);
  osc.frequency.setValueAtTime(659, now + 0.24);
  osc.frequency.setValueAtTime(523, now + 0.32);
  
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.setValueAtTime(0.15, now + 0.08);
  gain.gain.setValueAtTime(0, now + 0.12);
  gain.gain.setValueAtTime(0.15, now + 0.16);
  gain.gain.setValueAtTime(0, now + 0.24);
  gain.gain.setValueAtTime(0.15, now + 0.32);
  gain.gain.exponentialRampToValueAtTime(0.01, now + 0.42);
  
  osc.start(now);
  osc.stop(now + 0.42);
}

// ============================================================
// FULLSCREEN TOGGLE FUNCTION
// ============================================================
function toggleFullscreenMode() {
  const roomWrap = document.getElementById('roomWrap');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  
  if (!roomWrap || !fullscreenBtn) return;
  
  isFullscreenMode = !isFullscreenMode;
  fullscreenTileId = null;
  
  roomWrap.classList.toggle('fullscreen-mode', isFullscreenMode);
  fullscreenBtn.classList.toggle('active', isFullscreenMode);
  
  fullscreenBtn.textContent = isFullscreenMode ? '⛶' : '⛶';
  fullscreenBtn.title = isFullscreenMode ? 'Exit fullscreen' : 'Toggle fullscreen video area';
  
  updateFullscreenExitButton();
}

function exitFullscreen() {
  if (isFullscreenMode || fullscreenTileId) {
    isFullscreenMode = false;
    fullscreenTileId = null;
    
    const roomWrap = document.getElementById('roomWrap');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    
    roomWrap.classList.remove('fullscreen-mode');
    fullscreenBtn.classList.remove('active');
    
    document.querySelectorAll('.video-tile.tile-fullscreen').forEach(tile => {
      tile.classList.remove('tile-fullscreen');
    });
    
    updateFullscreenExitButton();
  }
}

function updateFullscreenExitButton() {
  let exitBtn = document.getElementById('fullscreenExitBtn');
  
  if (!exitBtn) {
    exitBtn = document.createElement('button');
    exitBtn.id = 'fullscreenExitBtn';
    exitBtn.className = 'fullscreen-exit-btn';
    exitBtn.textContent = '✕ Exit Fullscreen';
    exitBtn.style.display = 'none';
    document.body.appendChild(exitBtn);
    exitBtn.addEventListener('click', exitFullscreen);
  }
  
  if (isFullscreenMode || fullscreenTileId) {
    exitBtn.style.display = 'block';
  } else {
    exitBtn.style.display = 'none';
  }
}

function toggleTileFullscreen(tileId) {
  if (fullscreenTileId === tileId) {
    fullscreenTileId = null;
    document.getElementById(tileId).classList.remove('tile-fullscreen');
  } else {
    if (fullscreenTileId) {
      document.getElementById(fullscreenTileId).classList.remove('tile-fullscreen');
    }
    
    fullscreenTileId = tileId;
    document.getElementById(tileId).classList.add('tile-fullscreen');
  }
  
  updateFullscreenExitButton();
}

// ============================================================
// ADMIN CONTROLS FUNCTIONALITY
// ============================================================

function checkIfAdmin() {
  // The meeting API returns `createdBy`; `createdById` never exists.
  isAdmin = Boolean(meeting && currentUser && meeting.createdBy === currentUser.id);
  if (!isAdmin) return;

  document.getElementById('adminSettingsBtn').style.display = 'flex';
  initAdminControls();
  updateParticipantsList();
}

function initAdminControls() {
  document.getElementById('adminSettingsBtn').addEventListener('click', openAdminPanel);
  document.getElementById('closeAdminPanelBtn').addEventListener('click', closeAdminPanel);
  document.getElementById('adminPanelBackdrop').addEventListener('click', (event) => {
    if (event.target === event.currentTarget) closeAdminPanel();
  });
  document.getElementById('muteAllBtn').addEventListener('click', () => moderateEveryone('admin-audio-state', { muted: true }, 'Muted all attendees'));
  document.getElementById('cameraOffAllBtn').addEventListener('click', () => moderateEveryone('admin-camera-state', { enabled: false }, 'Turned off all attendee cameras'));
  document.getElementById('stopAllScreenBtn').addEventListener('click', () => moderateEveryone('admin-stop-screen-share', {}, 'Stopped all attendee screen shares'));
}

function openAdminPanel() {
  if (!isAdmin) return;
  const backdrop = document.getElementById('adminPanelBackdrop');
  backdrop.hidden = false;
  document.getElementById('adminSettingsBtn').setAttribute('aria-expanded', 'true');
  updateParticipantsList();
  document.getElementById('closeAdminPanelBtn').focus();
}

function closeAdminPanel() {
  document.getElementById('adminPanelBackdrop').hidden = true;
  document.getElementById('adminSettingsBtn').setAttribute('aria-expanded', 'false');
  document.getElementById('adminSettingsBtn').focus();
}

function moderateEveryone(action, payload, message) {
  if (!isAdmin || !socket) return;
  socket.emit(action, { meetingId, ...payload });
  addSystemChatLine(message);
}

function moderateParticipant(socketId, action, payload, message) {
  if (!isAdmin || !socket) return;
  socket.emit(action, { meetingId, targetSocketId: socketId, ...payload });
  addSystemChatLine(message);
}

function makeParticipantControl(label, title, onClick, danger = false) {
  const button = document.createElement('button');
  button.type = 'button';
  button.className = 'control-btn' + (danger ? ' danger' : '');
  button.textContent = label;
  button.title = title;
  button.addEventListener('click', onClick);
  return button;
}

function setCaptionsEnabled(enabled, announce = true) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (enabled && !SpeechRecognition) {
    alert('Live captions require Chrome or another browser that supports Web Speech Recognition.');
    return;
  }

  captionsEnabled = enabled;
  const captionsDisplay = document.getElementById('captionsDisplay');
  const captionsButton = document.getElementById('toggleCaptionsBtn');
  captionsDisplay.style.display = enabled ? 'flex' : 'none';
  captionsButton.classList.toggle('active', enabled);
  captionsButton.setAttribute('aria-pressed', String(enabled));
  captionsButton.title = enabled ? 'Turn live captions off' : 'Turn live captions on';
  captionsButton.setAttribute('aria-label', captionsButton.title);

  if (enabled) startSpeechRecognition();
  else stopSpeechRecognition();

  if (announce) addSystemChatLine(`Live captions ${enabled ? 'disabled' : 'enabled'}`);
}

function toggleLiveCaptions() {
  setCaptionsEnabled(!captionsEnabled);
}

function startSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition || recognition) return;

  const instance = new SpeechRecognition();
  recognition = instance;
  instance.continuous = true;
  instance.interimResults = true;
  instance.language = navigator.language || 'en-US';

  instance.onresult = (event) => {
    let interimTranscript = '';
    let finalTranscript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript.trim();
      if (event.results[i].isFinal) finalTranscript += `${transcript} `;
      else interimTranscript += transcript;
    }

    if (finalTranscript.trim()) {
      const text = finalTranscript.trim();
      displayCaption(`${currentUser.name}: ${text}`, false);
      socket?.emit('caption-text', { meetingId, text });
    }
    if (interimTranscript) displayCaption(`${currentUser.name}: ${interimTranscript}`, true);
  };

  instance.onerror = (event) => {
    console.warn('Speech recognition error:', event.error);
    if (['not-allowed', 'service-not-allowed', 'audio-capture'].includes(event.error)) {
      setCaptionsEnabled(false, false);
      addSystemChatLine('Live captions were stopped because microphone access is unavailable.');
    }
  };

  instance.onend = () => {
    if (recognition === instance) recognition = null;
    if (captionsEnabled) window.setTimeout(startSpeechRecognition, 250);
  };

  try {
    instance.start();
  } catch (error) {
    recognition = null;
    console.warn('Could not start speech recognition:', error);
  }
}

function stopSpeechRecognition() {
  if (!recognition) return;
  const instance = recognition;
  recognition = null;
  instance.abort();
}

function displayCaption(text, isInterim) {
  const captionsContent = document.getElementById('captionsContent');
  
  if (isInterim) {
    let interimEl = document.getElementById('interim-caption');
    if (!interimEl) {
      interimEl = document.createElement('div');
      interimEl.id = 'interim-caption';
      interimEl.className = 'caption-line interim';
      captionsContent.appendChild(interimEl);
    }
    interimEl.textContent = text;
  } else {
    const captionEl = document.createElement('div');
    captionEl.className = 'caption-line final';
    captionEl.textContent = text;
    captionsContent.appendChild(captionEl);
    
    const interimEl = document.getElementById('interim-caption');
    if (interimEl) interimEl.remove();
    
    captionsContent.scrollTop = captionsContent.scrollHeight;
    
    const lines = captionsContent.querySelectorAll('.caption-line.final');
    if (lines.length > 10) {
      lines[0].remove();
    }
  }
}

function updateParticipantsList() {
  if (!isAdmin) return;
  const list = document.getElementById('participantsList');
  list.innerHTML = '';

  const attendees = Object.entries(remoteState).filter(([socketId, state]) => socketId !== socket?.id && state.name);
  document.getElementById('adminParticipantCount').textContent = `${attendees.length} online`;
  if (!attendees.length) {
    const empty = document.createElement('p');
    empty.className = 'participants-empty';
    empty.textContent = 'No other attendees are in the room yet.';
    list.appendChild(empty);
    return;
  }

  attendees.sort(([, a], [, b]) => a.name.localeCompare(b.name));
  attendees.forEach(([socketId, state]) => {
    const item = document.createElement('div');
    item.className = 'participant-item';

    const info = document.createElement('div');
    info.className = 'participant-info';
    const name = document.createElement('span');
    name.className = 'participant-name';
    name.textContent = state.name;
    const stateText = document.createElement('span');
    stateText.className = 'participant-state';
    stateText.textContent = `${state.micMuted ? 'Muted' : 'Mic on'} · ${state.cameraOn ? 'Camera on' : 'Camera off'}${state.sharingScreen ? ' · Sharing' : ''}`;
    info.append(name, stateText);

    const controls = document.createElement('div');
    controls.className = 'participant-controls';

    // Audio controls
    if (!state.micMuted) {
      controls.append(makeParticipantControl('Mute', `Mute ${state.name}`, () => moderateParticipant(socketId, 'admin-audio-state', { muted: true }, `Muted ${state.name}`)));
    } else {
      controls.append(makeParticipantControl('Ask to Unmute', `Ask ${state.name} to unmute`, () => moderateParticipant(socketId, 'admin-request-audio', {}, `Asked ${state.name} to unmute`)));
    }

    // Video controls
    if (state.cameraOn) {
      controls.append(makeParticipantControl('Camera off', `Turn off ${state.name}'s camera`, () => moderateParticipant(socketId, 'admin-camera-state', { enabled: false }, `Turned off ${state.name}'s camera`)));
    } else {
      controls.append(makeParticipantControl('Ask to Start Video', `Ask ${state.name} to start video`, () => moderateParticipant(socketId, 'admin-request-camera', {}, `Asked ${state.name} to start video`)));
    }

    // Screen share controls
    if (state.sharingScreen) {
      controls.append(makeParticipantControl('Stop share', `Stop ${state.name}'s screen share`, () => moderateParticipant(socketId, 'admin-stop-screen-share', {}, `Stopped ${state.name}'s screen share`), true));
    }
    
    item.append(info, controls);
    list.appendChild(item);
  });
}

// ============================================================
// INIT + LOBBY
// ============================================================
async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;

  await loadIceConfig();

  try {
    const data = await apiGet('/api/meetings/' + meetingId);
    meeting = data.meeting;
  } catch (err) {
    document.getElementById('lobbyStatus').textContent = 'You are not authorized to join this meeting: ' + err.message;
    return;
  }

  document.getElementById('lobbyTitle').textContent = meeting.title;
  document.getElementById('lobbySub').textContent =
    `${meeting.departmentName} • ${meeting.date} at ${meeting.time} • Organized by ${meeting.createdByName}`;
  document.getElementById('lobbyAvatar').textContent = (currentUser.name || '?').charAt(0).toUpperCase();

  try {
    rawStream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: true });
  } catch (err) {
    document.getElementById('lobbyStatus').textContent = 'Camera/microphone access denied. You can still join with chat only.';
    rawStream = new MediaStream();
  }

  audioTrack = rawStream.getAudioTracks()[0] || null;
  const camTrack = rawStream.getVideoTracks()[0] || null;
  cameraOn = !!camTrack;
  outboundVideoTrack = camTrack;

  const lobbyVideo = document.getElementById('lobbyVideo');
  lobbyVideo.srcObject = new MediaStream(camTrack ? [camTrack] : []);
  document.getElementById('lobbyPreview').classList.toggle('cam-off', !cameraOn);

  renderBackgroundPicker(document.getElementById('bgPanelLobby'), lobbyVideo);
  renderBackgroundPicker(document.getElementById('bgPopover'));
  renderReactionsPopover();

  document.getElementById('lobbyMicBtn').classList.toggle('off', !(audioTrack && audioTrack.enabled));
  document.getElementById('lobbyMicBtn').addEventListener('click', () => {
    if (!audioTrack) return;
    audioTrack.enabled = !audioTrack.enabled;
    document.getElementById('lobbyMicBtn').classList.toggle('off', !audioTrack.enabled);
    micOn = audioTrack.enabled;
    document.getElementById('micBtn').classList.toggle('off', !micOn);
  });
  document.getElementById('lobbyCamBtn').addEventListener('click', () => {
    if (!camTrack) return;
    cameraOn = !cameraOn;
    camTrack.enabled = cameraOn;
    document.getElementById('lobbyPreview').classList.toggle('cam-off', !cameraOn);
    document.getElementById('lobbyCamBtn').classList.toggle('off', !cameraOn);
    document.getElementById('camBtn').classList.toggle('off', !cameraOn);
  });
  document.getElementById('lobbyBgBtn').addEventListener('click', () => {
    document.getElementById('bgPanelLobby').classList.toggle('open');
  });

  document.getElementById('joinBtn').disabled = false;
  document.getElementById('joinBtn').addEventListener('click', joinMeeting);
}

function joinMeeting() {
  document.getElementById('lobbyOverlay').style.display = 'none';
  document.getElementById('roomWrap').style.display = 'flex';

  document.getElementById('meetingTitle').textContent = meeting.title;
  document.getElementById('meetingSub').textContent =
    `${meeting.departmentName} • ${meeting.date} at ${meeting.time} • Organized by ${meeting.createdByName}`;

  renderLocalTile();
  connectSocket();
  checkIfAdmin();

  document.getElementById('micBtn').addEventListener('click', toggleMic);
  document.getElementById('camBtn').addEventListener('click', toggleCam);
  document.getElementById('screenShareBtn').addEventListener('click', toggleScreenShare);
  document.getElementById('handBtn').addEventListener('click', toggleHand);
  document.getElementById('reactionBtn').addEventListener('click', () => togglePopover('reactionsPopover'));
  document.getElementById('bgBtn').addEventListener('click', () => togglePopover('bgPopover'));
  document.getElementById('toggleCaptionsBtn').addEventListener('click', toggleLiveCaptions);
  document.getElementById('closeCaptionsBtn').addEventListener('click', () => setCaptionsEnabled(false));
  document.getElementById('chatBtn').addEventListener('click', toggleChatPanel);
  document.getElementById('leaveBtn').addEventListener('click', leaveMeeting);
  document.getElementById('chatInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendChat();
  });

  document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreenMode);
  
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !document.getElementById('adminPanelBackdrop').hidden) {
      closeAdminPanel();
      return;
    }
    if (e.key === 'Escape' && (isFullscreenMode || fullscreenTileId)) {
      exitFullscreen();
    }
  });

  document.getElementById('micBtn').classList.toggle('off', !micOn);
  document.getElementById('camBtn').classList.toggle('off', !cameraOn);
}

function togglePopover(id) {
  ['reactionsPopover', 'bgPopover'].forEach(p => {
    if (p !== id) document.getElementById(p).classList.remove('open');
  });
  const popover = document.getElementById(id);
  popover.classList.toggle('open');
}

// ============================================================
// LOCAL TILE
// ============================================================
const localOutboundStream = new MediaStream();
function syncLocalOutboundStream() {
  localOutboundStream.getTracks().forEach(t => {
    if (t !== outboundVideoTrack && t !== audioTrack) localOutboundStream.removeTrack(t);
  });
  if (outboundVideoTrack && !localOutboundStream.getTracks().includes(outboundVideoTrack)) {
    localOutboundStream.addTrack(outboundVideoTrack);
  }
  if (audioTrack && !localOutboundStream.getTracks().includes(audioTrack)) {
    localOutboundStream.addTrack(audioTrack);
  }
  return localOutboundStream;
}
function currentOutboundStream() {
  return syncLocalOutboundStream();
}

function renderLocalTile() {
  const centerMsg = document.getElementById('centerMsg');

  const videoArea = document.getElementById('videoArea');

// ============================================================
// SOCKET / SIGNALING
// ============================================================
function connectSocket() {
  socket = io();

  socket.on('connect', () => {
    socket.emit('join-room', { meetingId });
    socket.emit('mic-changed', { meetingId, muted: !micOn });
    socket.emit('camera-changed', { meetingId, enabled: cameraOn });
    applyMutedIcon('tile-local', !micOn);
  });

  socket.on('join-error', (msg) => {
    document.getElementById('centerMsg').textContent = 'Cannot join: ' + msg;
  });

  socket.on('existing-users', (users) => {
    users.forEach(u => {
      const state = getRemoteState(u.socketId);
      state.name = u.name;
      state.sharingScreen = !!u.sharingScreen;
      state.handRaised = !!u.handRaised;
      state.micMuted = !!u.micMuted;
      state.cameraOn = u.cameraOn !== false;
      const entry = createPeerConnection(u.socketId, u.name, true);
      entry.sharingScreen = state.sharingScreen;
      entry.handRaised = state.handRaised;
    });
    updateParticipantCount();
    refreshHandBadges();
    updateParticipantsList();
  });

  socket.on('user-joined', (u) => {
    const state = getRemoteState(u.socketId);
    state.name = u.name;
    state.sharingScreen = !!u.sharingScreen;
    state.handRaised = !!u.handRaised;
    state.micMuted = !!u.micMuted;
    state.cameraOn = u.cameraOn !== false;
    addSystemChatLine(`${u.name} joined the meeting`);
    playNotificationSound('user-join');
    updateParticipantCount();
    updateParticipantsList();
  });

  socket.on('signal', async ({ from, name, data }) => {
    let entry = peers[from];
    if (!entry) entry = createPeerConnection(from, name, false);

    if (data.type === 'offer') {
      await entry.pc.setRemoteDescription(new RTCSessionDescription(data));
      await flushPendingIceCandidates(entry);
      const answer = await entry.pc.createAnswer();
      await entry.pc.setLocalDescription(answer);
      socket.emit('signal', { to: from, data: entry.pc.localDescription });
    } else if (data.type === 'answer') {
      await entry.pc.setRemoteDescription(new RTCSessionDescription(data));
      await flushPendingIceCandidates(entry);
    } else if (data.candidate) {
      await addIceCandidateToPeer(entry, data);
    }
  });

  socket.on('user-left', (u) => {
    addSystemChatLine(`${u.name} left the meeting`);
    playNotificationSound('user-left');
    const tile = document.getElementById('tile-' + u.socketId);
    if (tile) tile.remove();
    if (peers[u.socketId]) {
      peers[u.socketId].pc.close();
      delete peers[u.socketId];
    }
    delete remoteState[u.socketId];
    updateParticipantCount();
    refreshHandBadges();
    updateParticipantsList();
  });

  socket.on('chat-message', (msg) => {
    addChatLine(msg.name, msg.text, msg.time, msg.from === currentUser.id);
  });

  socket.on('screen-share-changed', ({ socketId, name, sharing }) => {
    const state = getRemoteState(socketId);
    state.sharingScreen = !!sharing;
    if (name) state.name = name;
    if (peers[socketId]) peers[socketId].sharingScreen = !!sharing;
    const tile = document.getElementById('tile-' + socketId);
    if (tile) {
      tile.classList.toggle('presenting', sharing);
      tile.classList.toggle('cam-off', !state.cameraOn && !sharing);
      let badge = tile.querySelector('.presenting-badge');
      if (sharing && !badge) {
        badge = document.createElement('div');
        badge.className = 'presenting-badge';
        badge.textContent = '🖥️ Presenting';
        tile.appendChild(badge);
      } else if (!sharing && badge) {
        badge.remove();
      }
    }
    updateSpotlight();
    addSystemChatLine(`${name} ${sharing ? 'started' : 'stopped'} sharing their screen`);
    if (sharing) playNotificationSound('screen-share');
    updateParticipantsList();
  });

  socket.on('hand-raised', ({ socketId, name, raised }) => {
    const state = getRemoteState(socketId);
    state.handRaised = !!raised;
    if (name) state.name = name;
    if (peers[socketId]) peers[socketId].handRaised = !!raised;
    refreshHandBadges();
    addSystemChatLine(`${name} ${raised ? 'raised' : 'lowered'} their hand ✋`);
    if (raised) playNotificationSound('hand-raise');
  });

  socket.on('reaction', ({ socketId, emoji }) => {
    if (socketId === socket.id) return;
    showFloatingEmoji(socketId, emoji);
  });

  socket.on('mic-changed', ({ socketId, muted }) => {
    const state = getRemoteState(socketId);
    state.micMuted = !!muted;
    applyMutedIcon('tile-' + socketId, state.micMuted);
    updateParticipantsList();
  });

  socket.on('camera-changed', ({ socketId, enabled }) => {
    const state = getRemoteState(socketId);
    state.cameraOn = !!enabled;
    const tile = document.getElementById('tile-' + socketId);
    if (tile) tile.classList.toggle('cam-off', !state.cameraOn && !state.sharingScreen);
    updateParticipantsList();
  });

  // These commands originate from the verified meeting owner on the server.
  socket.on('admin-audio-state', ({ muted }) => {
    if (muted) { 
      setMicEnabled(false);
      addSystemChatLine('The meeting owner muted you.');
    }
  });

  socket.on('admin-camera-state', ({ enabled }) => {
    if (!enabled) { 
      setCameraEnabled(false);
      addSystemChatLine('The meeting owner turned your camera off.');
    }
  });
  
  socket.on('admin-request-audio', () => {
    if (confirm("The meeting owner is asking you to unmute your microphone. Allow?")) {
      setMicEnabled(true);
    }
  });

  socket.on('admin-request-camera', () => {
    if (confirm("The meeting owner is asking you to turn on your camera. Allow?")) {
      setCameraEnabled(true);
    }
  });

  socket.on('admin-stop-screen-share', () => {
    if (isScreenSharing) {
      stopScreenShare();
      addSystemChatLine('The meeting owner stopped your screen share.');
    }
  });

  socket.on('moderation-error', (message) => addSystemChatLine(`Meeting controls: ${message}`));

  socket.on('caption-received', ({ speaker, text }) => {
    if (captionsEnabled) displayCaption(`${speaker}: ${text}`, false);
  });
}

function applyMutedIcon(tileId, muted) {
  const tile = document.getElementById(tileId);
  if (!tile) return;
  let icon = tile.querySelector('.muted-icon');
  if (muted && !icon) {
    icon = document.createElement('div');
    icon.className = 'muted-icon';
    icon.textContent = '🔇';
    icon.title = 'Microphone muted';
    tile.appendChild(icon);
  } else if (!muted && icon) {
    icon.remove();
  }
}

function createPeerConnection(socketId, name, isInitiator) {
  const pc = new RTCPeerConnection(iceConfig);
  const state = getRemoteState(socketId);
  if (name) state.name = name;
  peers[socketId] = { pc, name, sharingScreen: state.sharingScreen, handRaised: state.handRaised, pendingCandidates: [] };

  const sendStream = currentOutboundStream();
  // Keep explicit references to the senders so we can reliably reuse them later
  // (replaceTrack) even after a track has been nulled out, e.g. camera toggled off.
  peers[socketId].videoSender = outboundVideoTrack ? pc.addTrack(outboundVideoTrack, sendStream) : null;
  peers[socketId].audioSender = audioTrack ? pc.addTrack(audioTrack, sendStream) : null;

  pc.onicecandidate = (e) => {
    if (e.candidate) socket.emit('signal', { to: socketId, data: e.candidate });
  };

  pc.onicegatheringstatechange = () => {
    console.log('[ICE] gathering state for', socketId, '=', pc.iceGatheringState);
  };

  pc.oniceconnectionstatechange = () => {
    console.log('[ICE] connection state for', socketId, '=', pc.iceConnectionState);
    if (pc.iceConnectionState === 'failed') {
      // Direct P2P and the configured TURN relay both failed to connect.
      // Ask the browser to re-gather candidates and try again once.
      console.warn('ICE failed for', socketId, '- attempting ICE restart. If this keeps happening, configure a reliable TURN server (see README).');
      restartIce(socketId);
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed') {
      console.warn('Peer connection failed for', socketId, '- check network/TURN settings');
      addSystemChatLine('Connection trouble with a participant. Retrying...');
    }
  };

  pc.ontrack = (e) => {
    let tile = document.getElementById('tile-' + socketId);
    if (!tile) {
      const videoArea = document.getElementById('videoArea');
      tile = document.createElement('div');
      tile.className = 'video-tile';
      tile.id = 'tile-' + socketId;
      const video = document.createElement('video');
      video.autoplay = true; video.playsInline = true;
      const avatar = document.createElement('div');
      avatar.className = 'avatar-fallback';
      avatar.innerHTML = `<div class="avatar-circle">${(name || '?').charAt(0).toUpperCase()}</div>`;
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = name || 'Participant';
      const reactionLayer = document.createElement('div');
      reactionLayer.className = 'reaction-layer';
      reactionLayer.id = 'reaction-' + socketId;
      tile.appendChild(video);
      tile.appendChild(avatar);
      tile.appendChild(label);
      tile.appendChild(reactionLayer);
      videoArea.appendChild(tile);
      
      tile.addEventListener('click', () => toggleTileFullscreen('tile-' + socketId));

      const state = getRemoteState(socketId);
      if (peers[socketId]) {
        peers[socketId].sharingScreen = state.sharingScreen;
        peers[socketId].handRaised = state.handRaised;
      }
      if (state.sharingScreen) {
        tile.classList.add('presenting');
        if (!tile.querySelector('.presenting-badge')) {
          const badge = document.createElement('div');
          badge.className = 'presenting-badge';
          badge.textContent = '🖥️ Presenting';
          tile.appendChild(badge);
        }
      }
      applyMutedIcon(tile.id, state.micMuted);
      tile.classList.toggle('cam-off', !state.cameraOn && !state.sharingScreen);
      refreshHandBadges();
      updateSpotlight();
    }
    const videoEl = tile.querySelector('video');
    let combinedStream = peers[socketId].remoteStream;
    if (!combinedStream) {
      combinedStream = new MediaStream();
      peers[socketId].remoteStream = combinedStream;
      videoEl.srcObject = combinedStream;
    }
    if (!combinedStream.getTracks().includes(e.track)) {
      combinedStream.addTrack(e.track);
    }
    videoEl.play().catch(() => {});
    e.track.addEventListener('ended', () => {
      if (combinedStream.getTracks().includes(e.track)) combinedStream.removeTrack(e.track);
    });
    if (e.track.kind === 'video') {
      const remoteCameraState = getRemoteState(socketId);
      const showVideo = remoteCameraState.sharingScreen || (remoteCameraState.cameraOn && !e.track.muted);
      tile.classList.toggle('cam-off', !showVideo);
      e.track.onunmute = () => {
        const rs = getRemoteState(socketId);
        tile.classList.toggle('cam-off', !rs.sharingScreen && !rs.cameraOn);
        videoEl.play().catch(() => {});
      };
    }
  };

  if (isInitiator) {
    renegotiatePeer(socketId);
  }

  return peers[socketId];
}

async function replaceOutboundTrackOnAllPeers(newTrack) {
  syncLocalOutboundStream();
  const peerIds = Object.keys(peers);
  for (const socketId of peerIds) {
    const entry = peers[socketId];
    const { pc } = entry;
    // Look the sender up by its *transceiver's mid/kind*, not by whether it
    // currently has a track attached (a sender's track becomes null once the
    // camera is turned off, which used to make this lookup fail and caused a
    // duplicate video sender/m-line to be added on the next toggle).
    let sender = entry.videoSender && pc.getSenders().includes(entry.videoSender)
      ? entry.videoSender
      : pc.getSenders().find(s => s.track && s.track.kind === 'video');
    if (!sender) {
      // Fall back to matching by transceiver kind so we still find a video
      // sender even when its track is currently null.
      sender = pc.getTransceivers().map(t => t.sender).find(s => s.track === null && pc.getSenders().includes(s) && !s.track && s === entry.videoSender);
    }
    if (sender) {
      await sender.replaceTrack(newTrack);
      entry.videoSender = sender;
    } else if (newTrack) {
      entry.videoSender = pc.addTrack(newTrack, localOutboundStream);
    }
  }
  for (const socketId of peerIds) {
    await renegotiatePeer(socketId);
  }
}

function updateParticipantCount() {
  const count = Object.keys(peers).length + 1;
  document.getElementById('participantCount').textContent = `👥 ${count} in the meeting`;
}

// ============================================================
// MIC / CAMERA
// ============================================================
function toggleMic() {
  setMicEnabled(!micOn);
}

function setMicEnabled(enabled) {
  if (!audioTrack) return;
  audioTrack.enabled = !!enabled;
  micOn = audioTrack.enabled;
  document.getElementById('micBtn').classList.toggle('off', !micOn);
  applyMutedIcon('tile-local', !micOn);
  socket?.emit('mic-changed', { meetingId, muted: !micOn });
}

function toggleCam() {
  setCameraEnabled(!cameraOn);
}

async function setCameraEnabled(enabled) {
  const camTrack = rawStream.getVideoTracks()[0];
  if (!camTrack) return;
  cameraOn = !!enabled;
  camTrack.enabled = cameraOn;
  document.getElementById('camBtn').classList.toggle('off', !cameraOn);

  if (!isScreenSharing) {
    if (!cameraOn) {
      if (segmentationActive) stopSegmentation();
      outboundVideoTrack = null;
      await replaceOutboundTrackOnAllPeers(null);
    } else if (currentBg && currentBg !== 'none') {
      await applyBackground(currentBg);
    } else {
      outboundVideoTrack = camTrack;
      await replaceOutboundTrackOnAllPeers(camTrack);
    }
  }

  updateLocalTileStream();
  socket?.emit('camera-changed', { meetingId, enabled: cameraOn });
}

// ============================================================
// SCREEN SHARING
// ============================================================
async function toggleScreenShare() {
  if (!isScreenSharing) {
    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
    } catch (err) {
      return;
    }
    preScreenShareTrack = outboundVideoTrack;
    const screenTrack = screenStream.getVideoTracks()[0];
    screenTrack.classList = screenTrack.classList || null;
    outboundVideoTrack = screenTrack;
    isScreenSharing = true;

    await replaceOutboundTrackOnAllPeers(screenTrack);
    updateLocalTileStream();
    document.getElementById('tile-local').querySelector('video').classList.add('screen-track');
    document.getElementById('screenShareBtn').classList.add('on-highlight');
    socket.emit('screen-share-started', { meetingId });

    screenTrack.onended = () => stopScreenShare();
  } else {
    stopScreenShare();
  }
}

async function stopScreenShare() {
  if (!isScreenSharing) return;
  if (screenStream) screenStream.getTracks().forEach(t => t.stop());
  isScreenSharing = false;
  outboundVideoTrack = preScreenShareTrack;
  await replaceOutboundTrackOnAllPeers(outboundVideoTrack);
  updateLocalTileStream();
  const localVideo = document.getElementById('tile-local').querySelector('video');
  localVideo.classList.remove('screen-track');
  document.getElementById('screenShareBtn').classList.remove('on-highlight');
  socket.emit('screen-share-stopped', { meetingId });
}

function updateSpotlight() {
  const videoArea = document.getElementById('videoArea');
  const presenterId = Object.keys(peers).find(id => peers[id].sharingScreen);
  videoArea.classList.toggle('has-spotlight', !!presenterId || isScreenSharing);
  document.querySelectorAll('.video-tile').forEach(t => t.classList.remove('spotlight'));
  if (isScreenSharing) {
    document.getElementById('tile-local').classList.add('spotlight');
  } else if (presenterId) {
    const tile = document.getElementById('tile-' + presenterId);
    if (tile) tile.classList.add('spotlight');
  }
}

// ============================================================
// RAISE HAND
// ============================================================
let handRaisedLocal = false;
function toggleHand() {
  handRaisedLocal = !handRaisedLocal;
  document.getElementById('handBtn').classList.toggle('on-highlight', handRaisedLocal);
  socket.emit('raise-hand', { meetingId, raised: handRaisedLocal });
  refreshHandBadges();
}

function refreshHandBadges() {
  document.querySelectorAll('.hand-icon').forEach(el => el.remove());
  const raisedNames = [];
  if (handRaisedLocal) {
    addHandIcon('tile-local');
    raisedNames.push('You');
  }
  const ids = new Set([...Object.keys(peers), ...Object.keys(remoteState)]);
  ids.forEach(id => {
    const raised = (peers[id] && peers[id].handRaised) || (remoteState[id] && remoteState[id].handRaised);
    if (raised) {
      addHandIcon('tile-' + id);
      const name = (peers[id] && peers[id].name) || (remoteState[id] && remoteState[id].name) || 'Participant';
      raisedNames.push(name);
    }
  });
  document.getElementById('raisedHandsStrip').textContent = raisedNames.length
    ? `✋ ${raisedNames.join(', ')}` : '';
}

function addHandIcon(tileId) {
  const tile = document.getElementById(tileId);
  if (!tile) return;
  const icon = document.createElement('div');
  icon.className = 'hand-icon';
  icon.textContent = '✋';
  tile.appendChild(icon);
}

// REACTIONS
// ============================================================
const REACTION_EMOJIS = ['👍', '❤️', '😂', '😮', '👏', '🎉', '🙌', '✅'];
function renderReactionsPopover() {
  const el = document.getElementById('reactionsPopover');
  el.innerHTML = REACTION_EMOJIS.map(e => `<button type="button" onclick="sendReaction('${e}')">${e}</button>`).join('');
}
function sendReaction(emoji) {
  socket.emit('reaction', { meetingId, emoji });
  showFloatingEmoji('local', emoji);
  document.getElementById('reactionsPopover').classList.remove('open');
}
function showFloatingEmoji(tileKey, emoji) {
  const layer = document.getElementById('reaction-' + tileKey);
  if (!layer) return;
  const span = document.createElement('span');
  span.className = 'floating-emoji';
  span.textContent = emoji;
  span.style.marginLeft = (Math.random() * 40 - 20) + 'px';
  layer.appendChild(span);
  setTimeout(() => span.remove(), 1800);
}

// ============================================================
// VIRTUAL BACKGROUND
// ============================================================
function renderBackgroundPicker(container, previewVideoOverride) {
  if (!container) return;
  container.classList.add('bg-popover');
  container.innerHTML = `
    <h4>Background</h4>
    <div class="bg-options">
      ${BG_PRESETS.map(p => `
        <div class="bg-option ${p.id === currentBg ? 'selected' : ''}" data-bg="${p.id}"
             style="${p.url ? `background-image:url('${p.url}')` : ''}"
             title="${p.label}">${p.url ? '' : p.emoji}</div>
      `).join('')}
      <div class="bg-option ${currentBg === 'custom' ? 'selected' : ''}" data-bg="custom" id="customBgThumb-${container === document.getElementById('bgPanelLobby') ? 'lobby' : 'main'}" title="Custom">📁</div>
    </div>
    <div class="bg-upload-row">
      <label>Upload image
        <input type="file" accept="image/*" class="bg-upload-input">
      </label>
    </div>
  `;
  container.querySelectorAll('.bg-option[data-bg]').forEach(opt => {
    opt.addEventListener('click', () => {
      const bgId = opt.dataset.bg;
      if (bgId === 'custom' && !customBgImage) return;
      applyBackground(bgId, previewVideoOverride);
    });
  });
  container.querySelector('.bg-upload-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const img = new Image();
    img.onload = () => {
      customBgImage = img;
      applyBackground('custom', previewVideoOverride);
      document.querySelectorAll('[id^="customBgThumb-"]').forEach(el => {
        el.style.backgroundImage = `url('${img.src}')`;
        el.textContent = '';
      });
    };
    img.src = URL.createObjectURL(file);
  });
}

async function applyBackground(bgId, previewVideoOverride) {
  currentBg = bgId;
  document.querySelectorAll('.bg-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.bg === bgId);
  });

  const camTrack = rawStream.getVideoTracks()[0];
  if (!camTrack) return;

  if (bgId === 'none') {
    stopSegmentation();
    if (isScreenSharing) return;
    outboundVideoTrack = camTrack;
    await replaceOutboundTrackOnAllPeers(outboundVideoTrack);
    const el = previewVideoOverride || document.querySelector('#tile-local video');
    if (el) el.srcObject = new MediaStream([camTrack]);
    if (!previewVideoOverride) updateLocalTileStream();
    return;
  }

  let bgImageEl = null;
  if (bgId === 'custom') bgImageEl = customBgImage;
  else {
    const preset = BG_PRESETS.find(p => p.id === bgId);
    if (preset && preset.url) {
      bgImageEl = await loadImage(preset.url);
    }
  }

  await startSegmentation(camTrack, bgId, bgImageEl, previewVideoOverride);
}

function loadImage(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

async function startSegmentation(camTrack, mode, bgImageEl, previewVideoOverride) {
  stopSegmentation();

  bgSourceVideo = document.createElement('video');
  bgSourceVideo.srcObject = new MediaStream([camTrack]);
  bgSourceVideo.muted = true;
  await bgSourceVideo.play();

  const w = camTrack.getSettings().width || 1280;
  const h = camTrack.getSettings().height || 720;
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = w; bgCanvas.height = h;
  bgCtx = bgCanvas.getContext('2d');

  if (!segmenter) {
    segmenter = new SelfieSegmentation({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
    });
    segmenter.setOptions({ modelSelection: 1 });
  }

  const canvasStream = bgCanvas.captureStream(25);
  const processedTrack = canvasStream.getVideoTracks()[0];
  let bgFirstFrameSent = false;

  segmenter.onResults((results) => {
    bgCtx.save();
    bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

    bgCtx.drawImage(results.segmentationMask, 0, 0, bgCanvas.width, bgCanvas.height);
    bgCtx.globalCompositeOperation = 'source-in';
    bgCtx.drawImage(results.image, 0, 0, bgCanvas.width, bgCanvas.height);

    bgCtx.globalCompositeOperation = 'destination-over';
    if (mode === 'blur') {
      bgCtx.filter = 'blur(14px)';
      bgCtx.drawImage(results.image, 0, 0, bgCanvas.width, bgCanvas.height);
      bgCtx.filter = 'none';
    } else if (bgImageEl) {
      bgCtx.drawImage(bgImageEl, 0, 0, bgCanvas.width, bgCanvas.height);
    } else {
      bgCtx.drawImage(results.image, 0, 0, bgCanvas.width, bgCanvas.height);
    }
    bgCtx.restore();

    if (!bgFirstFrameSent && results.segmentationMask) {
      bgFirstFrameSent = true;
      if (!isScreenSharing) {
        outboundVideoTrack = processedTrack;
        replaceOutboundTrackOnAllPeers(processedTrack);
      }
    }
  });

  segmentationActive = true;
  async function frameLoop() {
    if (!segmentationActive) return;
    await segmenter.send({ image: bgSourceVideo });
    bgAnimHandle = requestAnimationFrame(frameLoop);
  }
  frameLoop();

  const el = previewVideoOverride || document.querySelector('#tile-local video');
  if (el) el.srcObject = canvasStream;
  if (!previewVideoOverride) updateLocalTileStream();
}

function stopSegmentation() {
  segmentationActive = false;
  if (bgAnimHandle) cancelAnimationFrame(bgAnimHandle);
  bgAnimHandle = null;
  if (bgSourceVideo) { bgSourceVideo.pause(); bgSourceVideo.srcObject = null; }
}

// ============================================================
// CHAT
// ============================================================
function toggleChatPanel() {
  const panel = document.getElementById('chatPanel');
  panel.classList.toggle('hidden');
  document.getElementById('chatBtn').classList.toggle('active', !panel.classList.contains('hidden'));
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  socket.emit('chat-message', { meetingId, text });
  input.value = '';
}

function addChatLine(name, text, time, isMe) {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg';
  const t = new Date(time);
  const timeStr = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `<span class="who">${escapeHtml(isMe ? 'You' : name)}</span><span class="when">${timeStr}</span>
    <div class="text">${escapeHtml(text)}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function addSystemChatLine(text) {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = `<div class="text" style="color:#9ca3af; font-style:italic;">${escapeHtml(text)}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ============================================================
// LEAVE
// ============================================================
function leaveMeeting() {
  stopSegmentation();
  if (screenStream) screenStream.getTracks().forEach(t => t.stop());
  if (rawStream) rawStream.getTracks().forEach(t => t.stop());
  Object.values(peers).forEach(p => p.pc.close());
  if (socket) socket.disconnect();
  redirectByRole(currentUser.role);
}

window.addEventListener('beforeunload', () => {
  stopSegmentation();
  if (screenStream) screenStream.getTracks().forEach(t => t.stop());
  if (rawStream) rawStream.getTracks().forEach(t => t.stop());
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('#reactionBtn') && !e.target.closest('#reactionsPopover')) {
    document.getElementById('reactionsPopover').classList.remove('open');
  }
  if (!e.target.closest('#bgBtn') && !e.target.closest('#bgPopover')) {
    document.getElementById('bgPopover').classList.remove('open');
  }
});

init();
</script>
