
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meeting Platform — Login</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="images/UrMeetingLogo.png">
</head>
<script>document.documentElement.setAttribute("data-theme", localStorage.getItem("urmeeting-theme")==="dark"?"dark":"light");</script>
<body>
  <button class="btn btn-secondary theme-toggle-btn" id="themeToggleBtn" type="button" title="Switch between light and dark mode" style="position:fixed; top:16px; right:16px; z-index:10;">
    <img src="images/theme-dark.png" alt="Toggle theme" class="theme-toggle-icon" id="themeToggleIcon">
  </button>
  <div class="login-wrap">
    <div class="login-box">
<img src="images/UrMeetingLogo.png" alt="UrMeeting Logo" class="platform-logo">
      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" required placeholder="you@company.com">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••">
        <div style="margin-top:18px;">
          <button class="btn btn-primary" type="submit" style="width:100%;">Log In</button>
        </div>
        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>
  </div>

<script>
(function() {
  function currentTheme() { return localStorage.getItem('urmeeting-theme') === 'dark' ? 'dark' : 'light'; }
  function refreshIcon() {
    document.getElementById('themeToggleIcon').src = currentTheme() === 'dark' ? 'images/theme-light.png' : 'images/theme-dark.png';
  }
  refreshIcon();
  document.getElementById('themeToggleBtn').addEventListener('click', () => {
    const next = currentTheme() === 'dark' ? 'light' : 'dark';
    localStorage.setItem('urmeeting-theme', next);
    document.documentElement.setAttribute('data-theme', next);
    refreshIcon();
  });
})();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.textContent = '';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errorMsg.textContent = data.error || 'Login failed';
      return;
    }
    const role = data.user.role;
    if (role === 'superadmin') window.location.href = '/superadmin.html';
    else if (role === 'dept_admin') window.location.href = '/deptadmin.html';
    else window.location.href = '/employee.html';
  } catch (err) {
    errorMsg.textContent = 'Server error. Please try again.';
  }
});
</script>
</body>
</html>
